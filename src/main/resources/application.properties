spring.application.name=Ecourt

spring.datasource.url=jdbc:mysql://localhost:3306/ecourt_db
spring.datasource.username=root
spring.datasource.password=${ECOURT_DB_PASSWORD:yourpassword}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
logging.level.org.springframework.security=INFO
security.jwt.secret=${ECOURT_JWT_SECRET:dev-only-change-this-jwt-secret-before-production-1234567890}
security.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://127.0.0.1:5173
app.storage.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.error.include-message=always
server.error.include-stacktrace=never
logging.file.name=spring.log
server.port=8081

app.mail.enabled=${ECOURT_MAIL_ENABLED:false}
app.mail.from=${ECOURT_MAIL_FROM:no-reply@ecourt.local}
spring.mail.host=${ECOURT_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${ECOURT_MAIL_PORT:587}
spring.mail.username=${ECOURT_MAIL_USERNAME:}
spring.mail.password=${ECOURT_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${ECOURT_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${ECOURT_MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
