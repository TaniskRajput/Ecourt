spring.datasource.url=jdbc:h2:mem:ecourt_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
security.jwt.secret=test-only-jwt-secret-that-is-long-enough-1234567890
security.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:8000
app.storage.upload-dir=target/test-uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.level.org.springframework.security=WARN
app.mail.enabled=false
